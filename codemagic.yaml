# Codemagic CI/CD for NETRO (Capacitor 8 + SPM)
# https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/
#
# Bundle ID:  com.lilnetro01.talal
# Team ID:    T8KY6PR359
# ASC app:    NNN
#
# Capacitor 8 iOS uses App.xcodeproj (Swift Package Manager).
#
# Code signing (Release IPA) — manual profiles in Codemagic UI:
#   Teams → Code signing identities
#   - Upload distribution .p12 (password when prompted)
#   - Upload App Store .mobileprovision for com.lilnetro01.talal
#
# TestFlight upload — App Store Connect integration in Codemagic UI:
#   Team integrations → name must match `integrations.app_store_connect` (NETR)
#   Release workflow uses auth: integration (no .p8 env vars in yaml)
#
# Release web env (set in Codemagic UI — no invented defaults):
#   VITE_APP_ENV=production
#   VITE_SUPABASE_URL=https://YOUR_PROJECT.supabase.co
#   VITE_SUPABASE_PUBLISHABLE_KEY=<anon key>
#   VITE_ENABLE_DEV_TOOLS=false
#
# Vite 8 / Rolldown: `npm ci --include=optional` for Darwin native bindings.

workflows:
  ios-workflow:
    name: NETRO iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        CM_CLONE_DEPTH: 1
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify Rolldown Darwin binding
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm list vite rolldown @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 @rolldown/binding-darwin-universal || true
          ls -la node_modules/@rolldown || true
          if [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-x64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-universal" ]; then
            echo "ERROR: Missing Darwin Rolldown native binding after npm ci --include=optional"
            exit 1
          fi
          if [ "$(uname -m)" = "arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ]; then
            echo "ERROR: Missing @rolldown/binding-darwin-arm64 on Apple Silicon runner"
            exit 1
          fi
          echo "Darwin Rolldown binding OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL is required}"
          : "${VITE_SUPABASE_PUBLISHABLE_KEY:?VITE_SUPABASE_PUBLISHABLE_KEY is required}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir
        script: |
          set -euo pipefail
          npm run prepare:capacitor
      - name: Ensure iOS platform and sync
        script: |
          set -euo pipefail
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx cap sync ios
          ls -la ios/App
      - name: Build iOS (Simulator, no signing)
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/ios/App"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-release-workflow:
    integrations:
      app_store_connect: NETR
    name: NETRO iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - TEST
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lilnetro01.talal
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        CM_CLONE_DEPTH: 1
        APP_STORE_APPLE_ID: "6792112710"
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify Rolldown Darwin binding
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm list vite rolldown @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 @rolldown/binding-darwin-universal || true
          ls -la node_modules/@rolldown || true
          if [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-x64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-universal" ]; then
            echo "ERROR: Missing Darwin Rolldown native binding after npm ci --include=optional"
            exit 1
          fi
          if [ "$(uname -m)" = "arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ]; then
            echo "ERROR: Missing @rolldown/binding-darwin-arm64 on Apple Silicon runner"
            exit 1
          fi
          echo "Darwin Rolldown binding OK"
      - name: Verify production env (Supabase credentials)
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-production}"
          export VITE_ENABLE_DEV_TOOLS="false"
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "ERROR: VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY must be set in Codemagic."
            exit 1
          fi
          case "${VITE_SUPABASE_URL}" in
            *localhost*|*127.0.0.1*|*YOUR_PROJECT*)
              echo "ERROR: VITE_SUPABASE_URL looks like a placeholder/localhost: ${VITE_SUPABASE_URL}"
              exit 1
              ;;
          esac
          echo "Production env OK (Supabase URL + publishable key set)"
      - name: Verify Bundle ID consistency
        script: |
          set -euo pipefail
          CAP_ID="$(node -e "const fs=require('fs'); const t=fs.readFileSync('capacitor.config.ts','utf8'); const m=t.match(/appId:\\s*[\\\"']([^\\\"']+)[\\\"']/); if(!m){console.error('Could not parse appId'); process.exit(1);} console.log(m[1]);")"
          PBX_ID="$(grep -E 'PRODUCT_BUNDLE_IDENTIFIER = ' ios/App/App.xcodeproj/project.pbxproj | head -1 | sed 's/.*= //;s/;//' | tr -d '[:space:]')"
          CM_ID="com.lilnetro01.talal"
          echo "capacitor.config.ts appId:           ${CAP_ID}"
          echo "Xcode PRODUCT_BUNDLE_IDENTIFIER:    ${PBX_ID}"
          echo "Codemagic ios_signing.bundle_id:    ${CM_ID}"
          if [ "${CAP_ID}" != "${PBX_ID}" ] || [ "${CAP_ID}" != "${CM_ID}" ]; then
            echo "ERROR: Bundle Identifiers are inconsistent."
            exit 1
          fi
          echo "Bundle ID consistency OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-production}"
          export VITE_ENABLE_DEV_TOOLS="false"
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL is required}"
          : "${VITE_SUPABASE_PUBLISHABLE_KEY:?VITE_SUPABASE_PUBLISHABLE_KEY is required}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir
        script: |
          set -euo pipefail
          npm run prepare:capacitor
      - name: Sync iOS
        script: |
          set -euo pipefail
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: |
          set -euo pipefail
          xcode-project use-profiles
      - name: Bump iOS build number
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/ios/App"
          # App Store Connect requires CFBundleVersion > last uploaded (currently 1).
          # Prefer Codemagic's CM_BUILD_NUMBER; fall back to a monotonic timestamp.
          BUILD_NUMBER="${CM_BUILD_NUMBER:-}"
          if [ -z "${BUILD_NUMBER}" ] || ! [ "${BUILD_NUMBER}" -gt 1 ] 2>/dev/null; then
            BUILD_NUMBER="$(date +%Y%m%d%H%M)"
          fi
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" App/Info.plist || true
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/g" App.xcodeproj/project.pbxproj
          grep -E 'CURRENT_PROJECT_VERSION' App.xcodeproj/project.pbxproj
          echo "Using CFBundleVersion / CURRENT_PROJECT_VERSION=${BUILD_NUMBER}"
      - name: Build IPA
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-workflow:
    name: NETRO Android
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.lilnetro01.talal"
        CM_CLONE_DEPTH: 1
      node: 22
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify Rolldown Darwin binding
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm list vite rolldown @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 @rolldown/binding-darwin-universal || true
          ls -la node_modules/@rolldown || true
          if [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-x64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-universal" ]; then
            echo "ERROR: Missing Darwin Rolldown native binding after npm ci --include=optional"
            exit 1
          fi
          if [ "$(uname -m)" = "arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ]; then
            echo "ERROR: Missing @rolldown/binding-darwin-arm64 on Apple Silicon runner"
            exit 1
          fi
          echo "Darwin Rolldown binding OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL is required}"
          : "${VITE_SUPABASE_PUBLISHABLE_KEY:?VITE_SUPABASE_PUBLISHABLE_KEY is required}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir and sync Android
        script: |
          set -euo pipefail
          npm run prepare:capacitor
          npx cap sync android
      - name: Build Android debug APK
        script: |
          set -euo pipefail
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

  # Release AAB/APK skeleton. Wire Codemagic Android code signing in the UI
  # (keystore + key properties) before distributing. Without signing, this
  # still validates a Release Gradle build on CI.
  android-release-workflow:
    name: NETRO Android Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - TEST
      vars:
        PACKAGE_NAME: "com.lilnetro01.talal"
        CM_CLONE_DEPTH: 1
      node: 22
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify production env (Supabase credentials)
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-production}"
          export VITE_ENABLE_DEV_TOOLS="false"
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "ERROR: VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY must be set in Codemagic."
            exit 1
          fi
          case "${VITE_SUPABASE_URL}" in
            *localhost*|*127.0.0.1*|*YOUR_PROJECT*)
              echo "ERROR: VITE_SUPABASE_URL looks like a placeholder/localhost: ${VITE_SUPABASE_URL}"
              exit 1
              ;;
          esac
          echo "Production env OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-production}"
          export VITE_ENABLE_DEV_TOOLS="false"
          : "${VITE_SUPABASE_URL:?VITE_SUPABASE_URL is required}"
          : "${VITE_SUPABASE_PUBLISHABLE_KEY:?VITE_SUPABASE_PUBLISHABLE_KEY is required}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir and sync Android
        script: |
          set -euo pipefail
          npm run prepare:capacitor
          npx cap sync android
      - name: Build Android release bundle
        script: |
          set -euo pipefail
          cd android
          ./gradlew bundleRelease assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk

