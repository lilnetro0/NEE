# Codemagic CI/CD for NETRO (Capacitor 8 + SPM)
# https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/
#
# Capacitor 8 iOS uses App.xcodeproj (Swift Package Manager).
#
# Code signing (required for IPA):
#   1. Codemagic → Teams → Code signing identities
#      - Upload certificate: netro.p12 (enter the .p12 password)
#      - Upload profile:     Nexu.mobileprovision
#   2. Run workflow "NETRO iOS Release"
#
# Bundle ID: com.lilnetro0.nexus
#
# Vite 8 / Rolldown: install with `npm ci --include=optional` so Darwin
# native bindings from optionalDependencies are present on macOS runners.

workflows:
  ios-workflow:
    name: NETRO iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        CM_CLONE_DEPTH: 1
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify Rolldown Darwin binding
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm list vite rolldown @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 @rolldown/binding-darwin-universal || true
          ls -la node_modules/@rolldown || true
          # @rolldown/binding-darwin-universal is not published for rolldown 1.2.0;
          # Codemagic mac_mini_m2 needs darwin-arm64 (x64 kept for Intel hosts).
          if [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-x64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-universal" ]; then
            echo "ERROR: Missing Darwin Rolldown native binding after npm ci --include=optional"
            exit 1
          fi
          if [ "$(uname -m)" = "arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ]; then
            echo "ERROR: Missing @rolldown/binding-darwin-arm64 on Apple Silicon runner"
            exit 1
          fi
          echo "Darwin Rolldown binding OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-true}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://localhost:3000}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir
        script: |
          set -euo pipefail
          npm run prepare:capacitor
      - name: Ensure iOS platform and sync
        script: |
          set -euo pipefail
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx cap sync ios
          ls -la ios/App
      - name: Build iOS (Simulator, no signing)
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/ios/App"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-release-workflow:
    name: NETRO iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lilnetro0.nexus
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        CM_CLONE_DEPTH: 1
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify Rolldown Darwin binding
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm list vite rolldown @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 @rolldown/binding-darwin-universal || true
          ls -la node_modules/@rolldown || true
          if [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-x64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-universal" ]; then
            echo "ERROR: Missing Darwin Rolldown native binding after npm ci --include=optional"
            exit 1
          fi
          if [ "$(uname -m)" = "arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ]; then
            echo "ERROR: Missing @rolldown/binding-darwin-arm64 on Apple Silicon runner"
            exit 1
          fi
          echo "Darwin Rolldown binding OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-production}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-false}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-https://api.example.netro.app}"
          export VITE_ENABLE_DEV_TOOLS="false"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir
        script: |
          set -euo pipefail
          npm run prepare:capacitor
      - name: Sync iOS
        script: |
          set -euo pipefail
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-workflow:
    name: NETRO Android
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.lilnetro0.nexus"
        CM_CLONE_DEPTH: 1
      node: 22
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: |
          set -euo pipefail
          npm ci --include=optional
      - name: Verify Rolldown Darwin binding
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm list vite rolldown @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 @rolldown/binding-darwin-universal || true
          ls -la node_modules/@rolldown || true
          if [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-x64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-universal" ]; then
            echo "ERROR: Missing Darwin Rolldown native binding after npm ci --include=optional"
            exit 1
          fi
          if [ "$(uname -m)" = "arm64" ] && [ ! -d "node_modules/@rolldown/binding-darwin-arm64" ]; then
            echo "ERROR: Missing @rolldown/binding-darwin-arm64 on Apple Silicon runner"
            exit 1
          fi
          echo "Darwin Rolldown binding OK"
      - name: Build web assets
        script: |
          set -euo pipefail
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-true}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://localhost:3000}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          test -d .output/public/assets
      - name: Prepare Capacitor web dir and sync Android
        script: |
          set -euo pipefail
          npm run prepare:capacitor
          npx cap sync android
      - name: Build Android debug APK
        script: |
          set -euo pipefail
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
