# Codemagic CI/CD for NETRO (Capacitor)
# https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/
#
# 1. Push this file to the repo root
# 2. In Codemagic, click "Check for configuration file"
#
# Later (optional):
# - Create env group `netro_public` with VITE_* public vars (never supplier secrets)
# - Configure iOS signing + App Store Connect integration
# - Configure Android keystore signing

workflows:
  ios-workflow:
    name: NETRO iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        CM_CLONE_DEPTH: 1
      node: 22
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets for Capacitor
        script: |
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-true}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://localhost:3000}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          npm run prepare:capacitor
      - name: Ensure iOS platform and sync
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles || echo "Configure ios_signing in Codemagic when ready for store builds"
      - name: Build ipa for distribution
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - $CM_BUILD_EMAIL
        notify:
          success: true
          failure: true

  android-workflow:
    name: NETRO Android
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.lilnetro0.nexus"
        CM_CLONE_DEPTH: 1
      node: 22
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets and sync Android
        script: |
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-true}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://localhost:3000}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          npm run prepare:capacitor
          npx cap sync android
      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - $CM_BUILD_EMAIL
        notify:
          success: true
          failure: true
