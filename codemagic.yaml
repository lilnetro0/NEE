# Codemagic CI/CD for NETRO (Capacitor 8 + SPM)
# https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/
#
# Capacitor 8 iOS uses App.xcodeproj (Swift Package Manager), not CocoaPods
# App.xcworkspace.

workflows:
  ios-workflow:
    name: NETRO iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        CM_CLONE_DEPTH: 1
      node: 22
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web assets for Capacitor
        script: |
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-true}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://localhost:3000}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          npm run prepare:capacitor
      - name: Ensure iOS platform and sync
        script: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx cap sync ios
          echo "iOS project contents:"
          ls -la ios/App
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles || echo "Configure ios_signing in Codemagic when ready for store builds"
      - name: Build ipa for distribution
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          # Capacitor 8 + SPM → .xcodeproj (not CocoaPods .xcworkspace)
          if [ -d "App.xcworkspace" ]; then
            xcode-project build-ipa \
              --workspace "App.xcworkspace" \
              --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa \
              --project "$XCODE_PROJECT" \
              --scheme "$XCODE_SCHEME"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-workflow:
    name: NETRO Android
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.lilnetro0.nexus"
        CM_CLONE_DEPTH: 1
      node: 22
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build web assets and sync Android
        script: |
          export VITE_APP_ENV="${VITE_APP_ENV:-preview}"
          export VITE_USE_MOCKS="${VITE_USE_MOCKS:-true}"
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://localhost:3000}"
          export VITE_ENABLE_DEV_TOOLS="${VITE_ENABLE_DEV_TOOLS:-false}"
          export VITE_APP_VERSION="${VITE_APP_VERSION:-1.0.0}"
          export VITE_BUILD_SHA="${VITE_BUILD_SHA:-${CM_COMMIT}}"
          npm run build
          npm run prepare:capacitor
          npx cap sync android
      - name: Build Android debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
