# Railway (Railpack) — NETRO frontend
#
# TanStack Start + Nitro writes client assets to `.output/public` (not `dist`).
# Railpack's Vite SPA path still defaults to `dist` unless RAILPACK_SPA_OUTPUT_DIR
# is set as a Railway *service* variable (toml [variables] is not applied at
# Railpack plan time). Stage into `dist` after prepare:capacitor so deploy works
# without dashboard config.
#
# Also set these in the Railway service (build-time):
#   VITE_APP_ENV=production
#   VITE_SUPABASE_URL=https://YOUR_PROJECT.supabase.co
#   VITE_SUPABASE_PUBLISHABLE_KEY=<anon key>
#   VITE_ENABLE_DEV_TOOLS=false
#
# Keep bun.lock in sync with package.json (`bun install`).

[build]
builder = "RAILPACK"
buildCommand = "bun run build && bun run prepare:capacitor && rm -rf dist && mkdir -p dist && cp -a .output/public/. dist/"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
