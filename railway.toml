# Railway (Railpack) — NETRO frontend
#
# TanStack Start + Nitro writes client assets to `.output/public` (not `dist`).
#
# Also set these in the Railway service (build-time):
#   VITE_APP_ENV=production
#   VITE_USE_MOCKS=false
#   VITE_API_BASE_URL=https://your-api.example.com/api
#   VITE_ENABLE_DEV_TOOLS=false
#
# Keep bun.lock in sync with package.json (`bun install`).

[build]
builder = "RAILPACK"
buildCommand = "bun run build && bun run prepare:capacitor"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Force Railpack SPA root away from default `dist`.
[variables]
RAILPACK_SPA_OUTPUT_DIR = ".output/public"
